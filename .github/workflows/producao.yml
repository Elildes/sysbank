name: Producao - Sys Bank

on:
  pull_request:
    types: [closed]
    branches: [production]

permissions:
  contents: write

jobs:
  producao:
    name: Liberacao em producao
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      ( github.event.pull_request.head.ref == 'staging' ||
        startsWith(github.event.pull_request.head.ref, 'hotfix/') )

    steps:
      - name: Checkout (production + historico + tags)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build do projeto
        run: mvn clean compile --no-transfer-progress

      - name: Quality (SpotBugs)
        run: mvn spotbugs:check --no-transfer-progress

      - name: Testes unitarios
        run: mvn test --no-transfer-progress

      - name: Calcular tag rel
        id: rel
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          mapfile -t REL_TAGS < <(git tag -l 'rel-*' | sed 's/^rel-//')
          max_xy() {
            printf '%s\n' "${REL_TAGS[@]}" \
              | sed -E 's/^([0-9]+)\.([0-9]+).*/\1.\2/' \
              | sort -t. -k1,1n -k2,2n | tail -n1
          }
          if [ "$HEAD_REF" = "staging" ]; then
            XY=$(max_xy); X=${XY%.*}; Y=${XY#*.}
            NEW="rel-${X}.$((Y+1))"
          else
            XY=$(max_xy)
            XY_ESC=$(printf '%s' "$XY" | sed 's/\./\\./g')
            MAXZ=$(printf '%s\n' "${REL_TAGS[@]}" \
              | grep -E "^${XY_ESC}(\.[0-9]+)?$" \
              | sed -E "s/^${XY_ESC}\.?//" | sed -E 's/^$/0/' \
              | sort -n | tail -n1)
            NEW="rel-${XY}.$((MAXZ+1))"
          fi
          echo "Origem: $HEAD_REF -> Tag: $NEW"
          echo "tag=$NEW" >> "$GITHUB_OUTPUT"

      - name: Gerar pacote da versao
        shell: bash
        run: |
          set -euo pipefail
          mvn -DskipTests package --no-transfer-progress
          mkdir -p dist
          ( cd target && zip -j "../dist/${{ steps.rel.outputs.tag }}.zip" *.jar )

      - name: Publicar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rel.outputs.tag }}
          path: dist/${{ steps.rel.outputs.tag }}.zip
          if-no-files-found: error

      - name: Criar tag rel
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.rel.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release automatico: $TAG"
          git push origin "$TAG"
          