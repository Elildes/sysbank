name: Estabilizacao - Sys Bank

# Tarefa 2 (Parte 2): dispara quando um Pull Request e ACEITO (merge) na branch
# de homologacao (staging). A origem do PR define a tag criada:
#   - origem main        -> inicio de estabilizacao -> rc-X.(Y+1)
#   - origem bugfix/*     -> bugfix da estabilizacao -> rc-X.Y.(Z+1)
on:
  pull_request:
    types: [closed]
    branches: [staging]

permissions:
  contents: write        # necessario para o bot criar/empurrar a tag rc

jobs:
  estabilizacao:
    name: Estabilizacao da versao
    runs-on: ubuntu-latest

    # So roda em PR efetivamente ACEITO (merged) e cuja origem seja main ou bugfix/*
    if: >
      github.event.pull_request.merged == true &&
      ( github.event.pull_request.head.ref == 'main' ||
        startsWith(github.event.pull_request.head.ref, 'bugfix/') )

    steps:
      # 1. Checkout da staging ja com o merge aplicado, com historico e tags completos
      - name: Checkout (staging + historico + tags)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}   # = staging
          fetch-depth: 0
          fetch-tags: true

      # 2. Java 17 (com cache de dependencias Maven)
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Resolver dependencias + buildar (checagem sintatica)
      - name: Build do projeto
        run: mvn clean compile --no-transfer-progress

      # 4. Quality: analise estatica de codigo (SpotBugs)
      #    spotbugs:check FALHA o job se encontrar bugs >= threshold configurado
      - name: Quality (SpotBugs)
        run: mvn spotbugs:check --no-transfer-progress

      # 5. Testes unitarios
      - name: Testes unitarios
        run: mvn test --no-transfer-progress

      # 6. Calcular a proxima tag rc conforme a origem do PR
      - name: Calcular tag rc
        id: rc
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          # lista de tags rc-* sem o prefixo "rc-"
          mapfile -t RC_TAGS < <(git tag -l 'rc-*' | sed 's/^rc-//')

          # maior linha X.Y (ignorando o Z)
          max_xy() {
            printf '%s\n' "${RC_TAGS[@]}" \
              | sed -E 's/^([0-9]+)\.([0-9]+).*/\1.\2/' \
              | sort -t. -k1,1n -k2,2n | tail -n1
          }

          if [ "$HEAD_REF" = "main" ]; then
            # INICIO: incrementa Y do maior X.Y
            XY=$(max_xy); X=${XY%.*}; Y=${XY#*.}
            NEW="rc-${X}.$((Y+1))"
          else
            # BUGFIX: incrementa Z na linha X.Y atual (a maior)
            XY=$(max_xy)
            XY_ESC=$(printf '%s' "$XY" | sed 's/\./\\./g')
            MAXZ=$(printf '%s\n' "${RC_TAGS[@]}" \
              | grep -E "^${XY_ESC}(\.[0-9]+)?$" \
              | sed -E "s/^${XY_ESC}\.?//" | sed -E 's/^$/0/' \
              | sort -n | tail -n1)
            NEW="rc-${XY}.$((MAXZ+1))"
          fi

          echo "Origem do PR: $HEAD_REF  ->  Tag calculada: $NEW"
          echo "tag=$NEW" >> "$GITHUB_OUTPUT"

      # 7. Empacotar a versao como <rc-X.Y.Z>.zip
      - name: Gerar pacote da versao
        shell: bash
        run: |
          set -euo pipefail
          mvn -DskipTests package --no-transfer-progress
          mkdir -p dist
          ( cd target && zip -j "../dist/${{ steps.rc.outputs.tag }}.zip" *.jar )
          echo "Pacote gerado: dist/${{ steps.rc.outputs.tag }}.zip"

      # 8. Publicar o pacote em Artifacts (nome = nome da tag)
      - name: Publicar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rc.outputs.tag }}
          path: dist/${{ steps.rc.outputs.tag }}.zip
          if-no-files-found: error

      # 9. Criar e empurrar a tag rc (ultimo passo: so ocorre se tudo acima passou)
      - name: Criar tag rc
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.rc.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Estabilizacao automatica: $TAG"
          git push origin "$TAG"
          echo "Tag criada e enviada: $TAG"
